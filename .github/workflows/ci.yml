# ═══════════════════════════════════════════════════════════════════════
# NHC Capital — GitHub Actions CI/CD Pipeline
#
# Code Factory pattern: gate → review → test → human merge
# Reference: docs/code-factory-blueprint.md
# ═══════════════════════════════════════════════════════════════════════

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  # ═══════════════════════════════════════════════════════════════════
  # STAGE 0: contributor gate — Block PRs from non-contributors
  # ═══════════════════════════════════════════════════════════════════
  contributor-gate:
    name: "Gate: Contributor Check"
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Verify PR author is a contributor
        run: |
          TRUSTED="nhccapitalinc-gif brrainey13 yshahin14"
          AUTHOR="${{ github.event.pull_request.user.login }}"
          if echo "$TRUSTED" | grep -qw "$AUTHOR"; then
            echo "✅ $AUTHOR is a trusted contributor"
          else
            echo "❌ $AUTHOR is NOT a trusted contributor — PR blocked"
            echo "Only repo contributors can open PRs. Contact the team for access."
            exit 1
          fi

  # ═══════════════════════════════════════════════════════════════════
  # STAGE 1: gate — Risk classification + policy preflight
  # ═══════════════════════════════════════════════════════════════════
  gate:
    name: "Gate: Risk Policy"
    runs-on: ubuntu-latest
    needs: [contributor-gate]
    if: github.event_name == 'pull_request'
    outputs:
      risk_tier: ${{ steps.classify.outputs.tier }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Classify risk tier
        id: classify
        run: |
          echo "═══════════════════════════════════════════════════"
          echo "  STAGE 1: Risk Policy Gate (Preflight)"
          echo "═══════════════════════════════════════════════════"

          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD 2>/dev/null || echo "")
          echo "Changed files:"
          echo "$CHANGED" | head -30

          RESULT=$(echo "$CHANGED" | xargs python3 scripts/risk-classifier 2>/dev/null || echo '{"tier":"low","requiredChecks":["gate"]}')
          TIER=$(echo "$RESULT" | python3 -c "import sys,json; print(json.load(sys.stdin).get('tier','low'))")
          echo "Risk tier: $TIER"
          echo "tier=$TIER" >> "$GITHUB_OUTPUT"
          echo "✅ Gate passed — tier=$TIER"

  # ═══════════════════════════════════════════════════════════════════
  # STAGE 2: review — Code review agent (THE hard gate)
  # ═══════════════════════════════════════════════════════════════════
  code-review:
    name: "Review: Code Review Agent"
    runs-on: ubuntu-latest
    needs: gate
    if: github.event_name == 'pull_request'
    outputs:
      critical_count: ${{ steps.review-result.outputs.critical_count }}
      findings_count: ${{ steps.review-result.outputs.findings_count }}
      reviewed_sha: ${{ steps.review-result.outputs.reviewed_sha }}
    env:
      NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -q requests

      - name: Run code review
        id: review
        continue-on-error: true
        run: |
          echo "═══════════════════════════════════════════════════"
          echo "  STAGE 2: Code Review Agent"
          echo "═══════════════════════════════════════════════════"
          echo "PR: #${{ github.event.pull_request.number }} | HEAD: ${GITHUB_SHA:0:7}"
          python3 scripts/mr-review "${{ github.event.pull_request.number }}" --ci --auto-resolve --remediate --machine

      - name: Publish review outputs
        id: review-result
        if: always()
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path
          result = json.loads(Path(".review-result.json").read_text())
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as out:
              out.write(f"critical_count={result.get('critical_count', 0)}\n")
              out.write(f"findings_count={result.get('findings_count', 0)}\n")
              out.write(f"reviewed_sha={result.get('sha', '')}\n")
          PY

      - name: Upload review artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: review-findings
          path: |
            .review-result.json
            .review-findings.json
            .review-remediation.json
          if-no-files-found: error

      - name: Fail on critical findings
        if: steps.review.outcome == 'failure'
        run: exit 1

  auto-fix-review-findings:
    name: "Auto-Fix: Code Review Findings"
    runs-on: ubuntu-latest
    needs: code-review
    if: |
      always() &&
      github.event_name == 'pull_request' &&
      needs.code-review.outputs.critical_count != '' &&
      needs.code-review.outputs.critical_count != '0'
    permissions:
      contents: write
      pull-requests: write
      issues: write
    env:
      NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download review artifacts
        uses: actions/download-artifact@v4
        with:
          name: review-findings
          path: .

      - name: Auto-remediate critical findings
        run: |
          echo "═══════════════════════════════════════════════════"
          echo "  AUTO-FIX: Code Review Findings"
          echo "═══════════════════════════════════════════════════"
          echo "PR: #${{ github.event.pull_request.number }} | HEAD: ${GITHUB_SHA:0:7}"
          python3 scripts/remediate "${{ github.event.pull_request.number }}" --ci

  # ═══════════════════════════════════════════════════════════════════
  # Lint + Guards (BLOCKING — auto-fix workflow handles failures)
  # ═══════════════════════════════════════════════════════════════════
  lint:
    name: "Lint: ruff"
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -q ruff && ruff check .

  docs-guard:
    name: "Guard: Docs"
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python3 scripts/docs-guard

  test-backend:
    name: "Test: Backend"
    runs-on: ubuntu-latest
    needs: [lint]
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Create project venv
        run: python -m venv nhl-betting/.venv
      - name: Install project dependencies
        run: |
          nhl-betting/.venv/bin/pip install -r nhl-betting/requirements.txt
          nhl-betting/.venv/bin/pip install -r admin-dashboard/backend/requirements.txt
          nhl-betting/.venv/bin/pip install -r polymarket/requirements.txt
          nhl-betting/.venv/bin/pip install -r real-estate/requirements.txt
      - name: Run backend regression tests
        run: nhl-betting/.venv/bin/python -m pytest tests/ -v

  schema-guard:
    name: "Guard: Schema"
    runs-on: ubuntu-latest
    needs: gate
    if: github.event_name == 'pull_request'
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: |
          python3 scripts/schema-guard --pr
          python3 scripts/schema-guard --validate

  # ═══════════════════════════════════════════════════════════════════
  # Notify — Discord on main push
  # ═══════════════════════════════════════════════════════════════════
  discord-notify:
    name: "Notify: Discord"
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Post to Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%s)
          COMMIT_SHA=$(git log -1 --pretty=%h)
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          curl -s -H "Content-Type: application/json" \
            -d "{\"embeds\":[{\"title\":\"✅ CI: ${COMMIT_MSG}\",\"description\":\"**Commit:** \`${COMMIT_SHA}\`\n**Pipeline:** [View logs](${RUN_URL})\",\"color\":3066993}]}" \
            "$DISCORD_WEBHOOK"
