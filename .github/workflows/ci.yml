name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: connorrainey
          POSTGRES_DB: nhl_betting
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pytest ruff httpx pytest-asyncio asyncpg fastapi uvicorn pydantic python-dotenv

      - name: Seed test tables
        run: |
          psql "postgresql://connorrainey@localhost:5432/nhl_betting" -c "
            CREATE TABLE IF NOT EXISTS teams (
              team_id integer PRIMARY KEY,
              tri_code text UNIQUE,
              team_name text,
              team_name_fr text,
              conference_name text,
              division_name text,
              active integer DEFAULT 1,
              last_updated text DEFAULT 'CURRENT_TIMESTAMP'
            );
            INSERT INTO teams (team_id, tri_code, team_name, conference_name, division_name) VALUES
              (1, 'BOS', 'Bruins', 'Eastern', 'Atlantic'),
              (2, 'NYR', 'Rangers', 'Eastern', 'Metropolitan'),
              (3, 'MTL', 'Canadiens', 'Eastern', 'Atlantic'),
              (4, 'TOR', 'Maple Leafs', 'Eastern', 'Atlantic'),
              (5, 'CHI', 'Blackhawks', 'Western', 'Central')
            ON CONFLICT DO NOTHING;
          "
        env:
          PGPASSWORD: ""

      - name: Lint
        run: ruff check .

      - name: Docs guard
        run: python3 scripts/docs-guard

      - name: Run tests
        run: pytest

      - name: Discord notification
        if: always()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            EMOJI="✅"
            COLOR="3066993"
          else
            EMOJI="❌"
            COLOR="15158332"
          fi

          COMMIT_MSG=$(git log -1 --pretty=%s)
          COMMIT_SHA=$(git log -1 --pretty=%h)
          AUTHOR=$(git log -1 --pretty=%an)

          curl -s -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"${EMOJI} CI: ${COMMIT_MSG}\",
                \"description\": \"**Status:** ${{ job.status }}\\n**Commit:** \`${COMMIT_SHA}\`\\n**Author:** ${AUTHOR}\",
                \"color\": ${COLOR},
                \"url\": \"https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"
              }]
            }" \
            "$DISCORD_WEBHOOK"
