name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: connorrainey
          POSTGRES_DB: nhl_betting
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pytest ruff httpx pytest-asyncio asyncpg fastapi uvicorn pydantic python-dotenv

      - name: Seed test tables
        run: |
          psql "postgresql://connorrainey@localhost:5432/nhl_betting" -c "
            CREATE TABLE IF NOT EXISTS teams (
              team_id integer PRIMARY KEY,
              tri_code text UNIQUE,
              team_name text,
              team_name_fr text,
              conference_name text,
              division_name text,
              active integer DEFAULT 1,
              last_updated text DEFAULT 'CURRENT_TIMESTAMP'
            );
            INSERT INTO teams (team_id, tri_code, team_name, conference_name, division_name) VALUES
              (1, 'BOS', 'Bruins', 'Eastern', 'Atlantic'),
              (2, 'NYR', 'Rangers', 'Eastern', 'Metropolitan'),
              (3, 'MTL', 'Canadiens', 'Eastern', 'Atlantic'),
              (4, 'TOR', 'Maple Leafs', 'Eastern', 'Atlantic'),
              (5, 'CHI', 'Blackhawks', 'Western', 'Central')
            ON CONFLICT DO NOTHING;
          "
        env:
          PGPASSWORD: ""

      - name: Lint
        run: ruff check .

      - name: Docs guard
        run: python3 scripts/docs-guard

      - name: Run tests
        run: pytest

      - name: Discord notification
        if: always()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            EMOJI="✅"
            COLOR="3066993"
          else
            EMOJI="❌"
            COLOR="15158332"
          fi

          COMMIT_MSG=$(git log -1 --pretty=%s)
          COMMIT_SHA=$(git log -1 --pretty=%h)
          COMMIT_FULL=$(git log -1 --pretty=%H)
          AUTHOR=$(git log -1 --pretty=%an)
          REPO="${{ github.repository }}"
          COMMIT_URL="https://github.com/${REPO}/commit/${COMMIT_FULL}"
          RUN_URL="https://github.com/${REPO}/actions/runs/${{ github.run_id }}"

          # Changed files summary
          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "(first commit)")
          FILE_COUNT=$(echo "$CHANGED" | grep -c . || echo 0)

          # Docs changes
          DOCS_CHANGED=$(echo "$CHANGED" | grep -E '^docs/|CLAUDE\.md' || true)
          if [ -n "$DOCS_CHANGED" ]; then
            DOCS_LIST=$(echo "$DOCS_CHANGED" | sed 's/^/• /' | head -10)
            DOCS_SECTION="\\n\\n📄 **Docs updated:**\\n${DOCS_LIST}"
          else
            DOCS_SECTION=""
          fi

          # Files changed (compact, top 8)
          FILES_LIST=$(echo "$CHANGED" | grep -v -E '^docs/|CLAUDE\.md' | sed 's/^/• /' | head -8)
          if [ -n "$FILES_LIST" ]; then
            FILES_SECTION="\\n\\n📁 **Files changed (${FILE_COUNT}):**\\n${FILES_LIST}"
            EXTRA=$(echo "$CHANGED" | grep -v -E '^docs/|CLAUDE\.md' | tail -n +9 | wc -l | tr -d ' ')
            if [ "$EXTRA" -gt 0 ]; then
              FILES_SECTION="${FILES_SECTION}\\n• ...and ${EXTRA} more"
            fi
          else
            FILES_SECTION=""
          fi

          DESC="**Status:** ${{ job.status }}\\n**Commit:** [\`${COMMIT_SHA}\`](${COMMIT_URL})\\n**Author:** ${AUTHOR}\\n**Run:** [View CI logs](${RUN_URL})${DOCS_SECTION}${FILES_SECTION}"

          curl -s -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"${EMOJI} CI: ${COMMIT_MSG}\",
                \"description\": \"${DESC}\",
                \"color\": ${COLOR}
              }]
            }" \
            "$DISCORD_WEBHOOK"
