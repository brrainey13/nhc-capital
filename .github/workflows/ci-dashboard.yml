name: CI — Dashboard

on:
  pull_request:
    branches: [main]
    paths:
      - 'admin-dashboard/**'
      - 'scripts/deploy-dashboard'
  push:
    branches: [main]
    paths:
      - 'admin-dashboard/**'
      - 'scripts/deploy-dashboard'

jobs:
  test-dashboard:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: connorrainey
          POSTGRES_DB: nhl_betting
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python deps
        run: pip install pytest ruff httpx pytest-asyncio asyncpg fastapi uvicorn pydantic python-dotenv

      - name: Seed test tables
        run: |
          psql "postgresql://connorrainey@localhost:5432/nhl_betting" -c "
            CREATE TABLE IF NOT EXISTS teams (
              team_id integer PRIMARY KEY,
              tri_code text UNIQUE,
              team_name text,
              team_name_fr text,
              conference_name text,
              division_name text,
              active integer DEFAULT 1,
              last_updated text DEFAULT 'CURRENT_TIMESTAMP'
            );
            INSERT INTO teams (team_id, tri_code, team_name, conference_name, division_name) VALUES
              (1, 'BOS', 'Bruins', 'Eastern', 'Atlantic'),
              (2, 'NYR', 'Rangers', 'Eastern', 'Metropolitan')
            ON CONFLICT DO NOTHING;
          "
        env:
          PGPASSWORD: ""

      - name: Lint backend
        run: ruff check admin-dashboard/

      - name: Test backend
        run: pytest admin-dashboard/ -v --tb=short

      - name: Build frontend
        run: |
          cd admin-dashboard/frontend
          npm ci
          npm run build

      - name: Discord notification
        if: always() && github.event_name == 'push'
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          if [ "${{ job.status }}" = "success" ]; then EMOJI="✅"; COLOR="3066993"; else EMOJI="❌"; COLOR="15158332"; fi
          COMMIT_MSG=$(git log -1 --pretty=%s)
          COMMIT_SHA=$(git log -1 --pretty=%h)
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -s -H "Content-Type: application/json" \
            -d "{\"embeds\":[{\"title\":\"${EMOJI} Dashboard CI: ${COMMIT_MSG}\",\"description\":\"**Status:** ${{ job.status }}\\n**Commit:** \`${COMMIT_SHA}\`\\n**Run:** [View logs](${RUN_URL})\",\"color\":${COLOR}}]}" \
            "$DISCORD_WEBHOOK"
