<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#0f1117" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="NHC Admin" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <title>NHC Admin Dashboard</title>
    <style>
      html, body, #root { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #0f1117; }
      * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
      input, select, textarea, button { font-size: 16px; }
      @media (min-width: 768px) {
        input, select, textarea, button { font-size: inherit; }
      }
      /* Visible scrollbars */
      ::-webkit-scrollbar { width: 8px; height: 8px; }
      ::-webkit-scrollbar-track { background: #181a20; }
      ::-webkit-scrollbar-thumb { background: #3a3d48; border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: #4f5360; }
      ::-webkit-scrollbar-corner { background: #181a20; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js').catch(() => {})
      }
    </script>
  </body>
</html>
