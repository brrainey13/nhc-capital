# ═══════════════════════════════════════════════════════════════════════
# NHC Capital — GitLab CI/CD Pipeline (TRANSITIONAL)
#
# Stripped down while we migrate to GitHub + set up properly.
# Only code-review is a hard gate. Everything else is allow_failure.
#
# TODO: Re-enable full pipeline after GitHub migration:
#   - lint (fix pre-existing ruff errors)
#   - docs-guard (fix front-matter)
#   - test-projects, test-dashboard, test-full (fix test suite)
#
# Reference: docs/code-factory-blueprint.md
# ═══════════════════════════════════════════════════════════════════════

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main" && $CI_PIPELINE_SOURCE == "push"'

stages:
  - gate
  - review
  - notify

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.pip-cache"

cache:
  paths:
    - .pip-cache/

# ═══════════════════════════════════════════════════════════════════════
# STAGE 1: gate — Risk classification + policy preflight
# ═══════════════════════════════════════════════════════════════════════

risk-policy-gate:
  stage: gate
  image: python:3.11-slim
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - when: never
  script:
    - |
      echo "═══════════════════════════════════════════════════"
      echo "  STAGE 1: Risk Policy Gate (Preflight)"
      echo "═══════════════════════════════════════════════════"

      apt-get update -qq && apt-get install -y -qq git > /dev/null 2>&1

      git fetch origin "$CI_MERGE_REQUEST_DIFF_BASE_SHA" --depth=1 2>/dev/null || true
      CHANGED=$(git diff --name-only "$CI_MERGE_REQUEST_DIFF_BASE_SHA" HEAD 2>/dev/null || echo "")
      echo "Changed files:"
      echo "$CHANGED" | head -30

      RESULT=$(echo "$CHANGED" | xargs python3 scripts/risk-classifier 2>/dev/null || echo '{"tier":"low","requiredChecks":["risk-policy-gate"]}')
      TIER=$(echo "$RESULT" | python3 -c "import sys,json; print(json.load(sys.stdin).get('tier','low'))")
      echo "Risk tier: $TIER"
      echo "RISK_TIER=$TIER" >> gate.env
      echo "✅ Gate passed — tier=$TIER"
  artifacts:
    reports:
      dotenv: gate.env

# ═══════════════════════════════════════════════════════════════════════
# STAGE 2: review — Code review agent (THE hard gate)
# ═══════════════════════════════════════════════════════════════════════

code-review:
  stage: review
  image: python:3.11-slim
  needs:
    - job: risk-policy-gate
      optional: true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - when: never
  script:
    - |
      echo "═══════════════════════════════════════════════════"
      echo "  STAGE 2: Code Review Agent"
      echo "═══════════════════════════════════════════════════"
      echo "MR: !$CI_MERGE_REQUEST_IID | HEAD: ${CI_COMMIT_SHA:0:7}"
      apt-get update -qq && apt-get install -y -qq git > /dev/null 2>&1
      python3 scripts/mr-review "$CI_MERGE_REQUEST_IID" --ci --auto-resolve --remediate
  artifacts:
    when: always
    paths:
      - .review-result.json
      - .review-remediation.json
    expire_in: 1 hour

# Lint + docs-guard + schema-guard: informational only
lint:
  stage: review
  image: python:3.11-slim
  allow_failure: true
  needs:
    - job: risk-policy-gate
      optional: true
  rules:
    - when: always
  script:
    - pip install -q ruff
    - ruff check .

docs-guard:
  stage: review
  image: python:3.11-slim
  allow_failure: true
  needs:
    - job: risk-policy-gate
      optional: true
  rules:
    - when: always
  script:
    - python3 scripts/docs-guard

schema-guard:
  stage: review
  image: python:3.11-slim
  allow_failure: true
  needs:
    - job: risk-policy-gate
      optional: true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - when: never
  script:
    - apt-get update -qq && apt-get install -y -qq git > /dev/null 2>&1
    - python3 scripts/schema-guard --pr
    - python3 scripts/schema-guard --validate

# ═══════════════════════════════════════════════════════════════════════
# STAGE: notify — Discord notification (main pushes only)
# ═══════════════════════════════════════════════════════════════════════

discord-notify:
  stage: notify
  image: alpine:latest
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - when: never
  script:
    - apk add --no-cache curl git
    - |
      if [ "$CI_JOB_STATUS" = "success" ]; then EMOJI="✅"; COLOR="3066993"; else EMOJI="❌"; COLOR="15158332"; fi
      COMMIT_MSG=$(git log -1 --pretty=%s)
      COMMIT_SHA=$(git log -1 --pretty=%h)
      curl -s -H "Content-Type: application/json" \
        -d "{\"embeds\":[{\"title\":\"${EMOJI} CI: ${COMMIT_MSG}\",\"description\":\"**Status:** $CI_JOB_STATUS\\n**Commit:** \`${COMMIT_SHA}\`\\n**Pipeline:** [View logs](${CI_PIPELINE_URL})\",\"color\":${COLOR}}]}" \
        "$DISCORD_WEBHOOK"
